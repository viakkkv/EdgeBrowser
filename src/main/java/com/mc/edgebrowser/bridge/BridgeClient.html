<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdgeBrowser Bridge Client</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #toolbar {
            height: 40px; background: #16213e; display: flex; align-items: center;
            padding: 0 10px; gap: 8px; border-bottom: 1px solid #0f3460;
        }
        #toolbar button {
            background: #0f3460; border: none; color: #eee; padding: 4px 12px;
            border-radius: 4px; cursor: pointer; font-size: 13px;
        }
        #toolbar button:hover { background: #533483; }
        #urlbar {
            flex: 1; background: #1a1a2e; border: 1px solid #0f3460; color: #eee;
            padding: 4px 10px; border-radius: 4px; font-size: 13px; outline: none;
        }
        #urlbar:focus { border-color: #533483; }
        #status {
            font-size: 11px; color: #888; min-width: 120px; text-align: right;
        }
        #status.connected { color: #4ecca3; }
        #status.disconnected { color: #e74c3c; }
        #container { position: relative; width: 100vw; height: calc(100vh - 40px); }
        #browser-frame {
            width: 100%; height: 100%; border: none; background: #000;
        }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; background: rgba(0,0,0,0.85); z-index: 10;
        }
        #overlay.hidden { display: none; }
        #overlay h2 { color: #533483; margin-bottom: 20px; }
        #overlay input {
            background: #16213e; border: 1px solid #0f3460; color: #eee;
            padding: 8px 14px; border-radius: 6px; font-size: 14px; width: 280px;
            margin: 4px; outline: none;
        }
        #overlay input:focus { border-color: #533483; }
        #overlay button {
            background: #533483; border: none; color: #fff; padding: 10px 30px;
            border-radius: 6px; cursor: pointer; font-size: 15px; margin-top: 15px;
        }
        #overlay button:hover { background: #0f3460; }
        #fps-counter {
            position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7);
            color: #4ecca3; padding: 2px 8px; border-radius: 4px; font-size: 12px;
            font-family: monospace; z-index: 5;
        }
        #config-panel {
            position: absolute; top: 40px; right: 0; width: 250px;
            background: #16213e; border-left: 1px solid #0f3460;
            padding: 15px; display: none; z-index: 5;
        }
        #config-panel.show { display: block; }
        #config-panel label { display: block; font-size: 12px; margin: 8px 0 2px; color: #aaa; }
        #config-panel input, #config-panel select {
            width: 100%; background: #1a1a2e; border: 1px solid #0f3460;
            color: #eee; padding: 4px 8px; border-radius: 4px; font-size: 12px;
        }
    </style>
</head>
<body>
<div id="toolbar">
    <button onclick="goBack()">◀</button>
    <button onclick="goForward()">▶</button>
    <button onclick="refreshPage()">↻</button>
    <input type="text" id="urlbar" placeholder="输入网址..." onkeydown="if(event.key==='Enter')navigateTo(this.value)">
    <button onclick="navigateTo(document.getElementById('urlbar').value)">→</button>
    <button onclick="toggleConfig()">⚙</button>
    <span id="status" class="disconnected">未连接</span>
</div>
<div id="container">
    <iframe id="browser-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div id="fps-counter">0 FPS</div>
    <div id="config-panel">
        <label>WebSocket地址</label>
        <input type="text" id="ws-addr" value="ws://localhost:9527">
        <label>验证密钥</label>
        <input type="text" id="ws-key" value="edge-browser-2024-secret">
        <label>浏览器ID</label>
        <input type="text" id="ws-bid" value="">
        <label>渲染质量</label>
        <select id="ws-quality">
            <option value="low">低 (160x128)</option>
            <option value="medium">中 (320x256)</option>
            <option value="high" selected>高 (480x384)</option>
            <option value="ultra">极高 (640x512)</option>
        </select>
        <label>目标帧率</label>
        <input type="number" id="ws-fps" value="10" min="1" max="30">
        <label>缩放比例</label>
        <input type="range" id="ws-scale" min="25" max="200" value="100">
    </div>
    <div id="overlay">
        <h2>🌐 EdgeBrowser Bridge</h2>
        <p style="color:#888;margin-bottom:15px;font-size:13px;">连接到Minecraft服务器以开始浏览</p>
        <input type="text" id="connect-addr" placeholder="ws://服务器IP:9527" value="ws://localhost:9527">
        <input type="text" id="connect-key" placeholder="验证密钥" value="edge-browser-2024-secret">
        <input type="text" id="connect-bid" placeholder="浏览器ID (可选)">
        <button onclick="connectToServer()">连接</button>
    </div>
</div>

<script>
    let ws = null;
    let connected = false;
    let canvas = null;
    let ctx = null;
    let frameCount = 0;
    let lastFpsTime = Date.now();
    let targetFps = 10;
    let captureInterval = null;
    let quality = 'high';
    const qualityMap = { low: {w:160,h:128}, medium: {w:320,h:256}, high: {w:480,h:384}, ultra: {w:640,h:512} };

    function connectToServer() {
        const addr = document.getElementById('connect-addr').value;
        const key = document.getElementById('connect-key').value;
        const bid = document.getElementById('connect-bid').value;

        document.getElementById('ws-addr').value = addr;
        document.getElementById('ws-key').value = key;
        document.getElementById('ws-bid').value = bid;

        if (ws) { ws.close(); }
        ws = new WebSocket(addr);

        ws.binaryType = 'arraybuffer';
        ws.onopen = () => {
            const auth = { type: 'auth', key: key, browserId: bid || undefined };
            ws.send(JSON.stringify(auth));
        };
        ws.onmessage = (e) => {
            if (typeof e.data === 'string') {
                handleServerMessage(JSON.parse(e.data));
            }
        };
        ws.onclose = () => {
            setConnected(false);
            stopCapture();
        };
        ws.onerror = () => {
            setConnected(false);
        };
    }

    function handleServerMessage(msg) {
        switch(msg.type) {
            case 'auth_result':
                if (msg.success) {
                    setConnected(true);
                    document.getElementById('overlay').classList.add('hidden');
                } else {
                    alert('认证失败: ' + msg.message);
                }
                break;
            case 'config':
                if (msg.url && msg.url !== 'about:blank') {
                    navigateTo(msg.url);
                }
                if (msg.width && msg.height) {
                    // 调整iframe大小（内部渲染大小）
                }
                if (msg.fps) {
                    targetFps = msg.fps;
                    document.getElementById('ws-fps').value = msg.fps;
                    startCapture();
                }
                break;
            case 'click':
                simulateClick(msg.x, msg.y, msg.button);
                break;
            case 'scroll':
                simulateScroll(msg.deltaX, msg.deltaY);
                break;
            case 'key':
                simulateKey(msg.key, msg.shift, msg.ctrl, msg.alt);
                break;
            case 'input':
                simulateInput(msg.text);
                break;
            case 'navigate':
                navigateTo(msg.url);
                break;
            case 'command':
                handleCommand(msg.command);
                break;
            case 'close':
                ws.close();
                break;
        }
    }

    function setConnected(c) {
        connected = c;
        const el = document.getElementById('status');
        el.className = c ? 'connected' : 'disconnected';
        el.textContent = c ? '已连接' : '未连接';
        if (c) startCapture(); else stopCapture();
    }

    function navigateTo(url) {
        if (!url.startsWith('http')) url = 'https://' + url;
        document.getElementById('urlbar').value = url;
        document.getElementById('browser-frame').src = url;
    }

    function goBack() { try { document.getElementById('browser-frame').contentWindow.history.back(); } catch(e){} }
    function goForward() { try { document.getElementById('browser-frame').contentWindow.history.forward(); } catch(e){} }
    function refreshPage() {
        const frame = document.getElementById('browser-frame');
        frame.src = frame.src;
    }

    function simulateClick(x, y, button) {
        const frame = document.getElementById('browser-frame');
        const rect = frame.getBoundingClientRect();
        const px = x * rect.width;
        const py = y * rect.height;

        const eventInit = {
            clientX: rect.left + px,
            clientY: rect.top + py,
            button: button === 'right' ? 2 : button === 'middle' ? 1 : 0,
            bubbles: true
        };

        const doc = frame.contentDocument;
        if (!doc) return;
        const el = doc.elementFromPoint(px, py);
        if (el) {
            const evtType = button === 'right' ? 'contextmenu' :
                            button === 'middle' ? 'mouseup' : 'click';
            el.dispatchEvent(new MouseEvent(evtType, eventInit));
            el.dispatchEvent(new MouseEvent('mousedown', eventInit));
            el.dispatchEvent(new MouseEvent('mouseup', eventInit));
            if (evtType === 'click') el.focus();
        }
    }

    function simulateScroll(deltaX, deltaY) {
        const frame = document.getElementById('browser-frame');
        try {
            frame.contentWindow.scrollBy(deltaX / 400, deltaY / 400);
        } catch(e) {}
    }

    function simulateKey(key, shift, ctrl, alt) {
        const frame = document.getElementById('browser-frame');
        try {
            const doc = frame.contentDocument;
            const el = doc.activeElement || doc.body;
            const keyMap = {
                'Enter': 'Enter', 'Backspace': 'Backspace', 'Tab': 'Tab',
                'Escape': 'Escape', 'Delete': 'Delete',
                'ArrowUp': 'ArrowUp', 'ArrowDown': 'ArrowDown',
                'ArrowLeft': 'ArrowLeft', 'ArrowRight': 'ArrowRight',
                'Space': ' '
            };
            const keyVal = keyMap[key] || (key.length === 1 ? key : key);
            el.dispatchEvent(new KeyboardEvent('keydown', {
                key: keyVal, code: key, shiftKey: shift, ctrlKey: ctrl, altKey: alt, bubbles: true
            }));
            el.dispatchEvent(new KeyboardEvent('keypress', {
                key: keyVal, code: key, shiftKey: shift, ctrlKey: ctrl, altKey: alt, bubbles: true
            }));
            el.dispatchEvent(new KeyboardEvent('keyup', {
                key: keyVal, code: key, shiftKey: shift, ctrlKey: ctrl, altKey: alt, bubbles: true
            }));
        } catch(e) {}
    }

    function simulateInput(text) {
        const frame = document.getElementById('browser-frame');
        try {
            const doc = frame.contentDocument;
            const el = doc.activeElement;
            if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) {
                // 使用execCommand或直接设置值
                el.value += text;
                el.dispatchEvent(new Event('input', { bubbles: true }));
            } else {
                // 使用document.execCommand
                doc.execCommand('insertText', false, text);
            }
        } catch(e) {}
    }

    function handleCommand(cmd) {
        if (cmd === 'back') goBack();
        else if (cmd === 'forward') goForward();
        else if (cmd === 'refresh') refreshPage();
        else if (cmd === 'clear') {
            document.getElementById('browser-frame').src = 'about:blank';
        }
        else if (cmd.startsWith('scale:')) {
            const scale = parseFloat(cmd.split(':')[1]);
            document.getElementById('browser-frame').style.transform = `scale(${scale})`;
            document.getElementById('browser-frame').style.transformOrigin = 'top left';
        }
        else if (cmd.startsWith('rotate:')) {
            const deg = parseInt(cmd.split(':')[1]);
            document.getElementById('browser-frame').style.transform =
                `rotate(${deg}deg) scale(${document.getElementById('ws-scale').value/100})`;
        }
    }

    // 帧捕获 - 使用html2canvas或原生方案
    function startCapture() {
        stopCapture();
        if (!connected) return;
        targetFps = parseInt(document.getElementById('ws-fps').value) || 10;
        quality = document.getElementById('ws-quality').value;
        const interval = Math.max(33, 1000 / targetFps);

        // 加载html2canvas
        if (typeof html2canvas === 'undefined') {
            loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js', () => {
                captureInterval = setInterval(captureFrame, interval);
            });
        } else {
            captureInterval = setInterval(captureFrame, interval);
        }
    }

    function stopCapture() {
        if (captureInterval) { clearInterval(captureInterval); captureInterval = null; }
    }

    async function captureFrame() {
        if (!ws || ws.readyState !== 1) return;
        try {
            const frame = document.getElementById('browser-frame');
            const doc = frame.contentDocument;
            if (!doc || !doc.body) return;

            const q = qualityMap[quality] || qualityMap.high;
            const result = await html2canvas(doc.body, {
                width: q.w, height: q.h,
                scale: 1,
                useCORS: true,
                allowTaint: true,
                backgroundColor: '#000',
                logging: false,
                imageTimeout: 50,
                removeContainer: true
            });

            result.toBlob((blob) => {
                if (blob && ws.readyState === 1) {
                    blob.arrayBuffer().then(buf => {
                        ws.send(buf);
                        updateFps();
                    });
                }
            }, 'image/jpeg', 0.7);
        } catch(e) {}
    }

    function updateFps() {
        frameCount++;
        const now = Date.now();
        if (now - lastFpsTime >= 1000) {
            document.getElementById('fps-counter').textContent = frameCount + ' FPS';
            frameCount = 0;
            lastFpsTime = now;
        }
    }

    function toggleConfig() {
        document.getElementById('config-panel').classList.toggle('show');
    }

    // 配置变化时重新启动捕获
    document.getElementById('ws-fps').addEventListener('change', startCapture);
    document.getElementById('ws-quality').addEventListener('change', startCapture);
    document.getElementById('ws-scale').addEventListener('input', (e) => {
        const s = e.target.value / 100;
        const frame = document.getElementById('browser-frame');
        frame.style.transform = `scale(${s})`;
        frame.style.transformOrigin = 'top left';
    });

    function loadScript(url, cb) {
        const s = document.createElement('script');
        s.src = url;
        s.onload = cb;
        document.head.appendChild(s);
    }
</script>
</body>
</html>
